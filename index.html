        :root {
            /* Ayu Mirage Dark */
            --color-bg-primary: #1f2430;     /* main background */
            --color-bg-secondary: #232834;   /* card background, header background */
            --color-bg-card: #282e3a;        /* inner element background (inputs, tags) */
            --color-text-primary: #cbccc6;   /* main text */
            --color-text-secondary: #707a8c; /* secondary text, labels */
            --color-accent: #ffcc66;         /* primary accent (yellowish/orange) */
            --color-accent-hover: #ffd580;   
            --color-border: #3b4252;         /* subtle borders */
            --color-success: #a6cc70;        /* Ayu green */
            --color-info: #5ccfe6;           /* Ayu cyan */
            --color-success-bg: rgba(166, 204, 112, 0.15);
            --color-info-bg: rgba(92, 207, 230, 0.15);
            
            --radius-sm: 2px;
            --radius-md: 4px;
            --radius-lg: 6px;
        }

        [data-theme="light"] {
            /* Ayu Light */
            --color-bg-primary: #fafafa;
            --color-bg-secondary: #ffffff;
            --color-bg-card: #f3f4f5;
            --color-text-primary: #5c6166;
            --color-text-secondary: #8a9199;
            --color-accent: #ff9940;
            --color-accent-hover: #ffb366;
            --color-border: #e6e6e6;
            --color-success: #86b300;
            --color-info: #399ee6;
            --color-success-bg: rgba(134, 179, 0, 0.1);
            --color-info-bg: rgba(57, 158, 230, 0.1);
        }

        /* Default light theme for users who prefer light mode but haven't chosen yet */
        @media (prefers-color-scheme: light) {
            :root:not([data-theme="dark"]) {
                --color-bg-primary: #fafafa;
                --color-bg-secondary: #ffffff;
                --color-bg-card: #f3f4f5;
                --color-text-primary: #5c6166;
                --color-text-secondary: #8a9199;
                --color-accent: #ff9940;
                --color-accent-hover: #ffb366;
                --color-border: #e6e6e6;
                --color-success: #86b300;
                --color-info: #399ee6;
                --color-success-bg: rgba(134, 179, 0, 0.1);
                --color-info-bg: rgba(57, 158, 230, 0.1);
            }
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: var(--color-bg-primary);
            color: var(--color-text-primary);
            line-height: 1.6;
            padding: 20px;
            transition: background 0.3s, color 0.3s;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            position: relative;
        }

        header {
            text-align: center;
            margin-bottom: 40px;
            padding-bottom: 20px;
            border-bottom: 2px solid var(--color-border);
            position: relative;
        }

        .theme-toggle {
            position: absolute;
            right: 0;
            top: 0;
            background: var(--color-bg-secondary);
            border: 1px solid var(--color-border);
            color: var(--color-text-primary);
            width: 36px;
            height: 36px;
            border-radius: var(--radius-md);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }

        .theme-toggle:hover {
            border-color: var(--color-accent);
            transform: scale(1.05);
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            color: var(--color-accent);
        }

        .subtitle {
            font-size: 1.1rem;
            color: var(--color-text-secondary);
        }

        .filter-section {
            background: var(--color-bg-secondary);
            padding: 20px;
            border-radius: var(--radius-lg);
            margin-bottom: 30px;
            border: 1px solid var(--color-border);
        }

        .filter-controls {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            align-items: center;
        }

        .filter-group {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .filter-group label {
            font-size: 0.9rem;
            color: var(--color-text-secondary);
            font-weight: 500;
        }

        select, input {
            padding: 8px 12px;
            border-radius: var(--radius-md);
            border: 1px solid var(--color-border);
            background: var(--color-bg-card);
            color: var(--color-text-primary);
            font-size: 0.95rem;
            cursor: pointer;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        select:focus, input:focus {
            outline: none;
            border-color: var(--color-accent);
            box-shadow: 0 0 0 1px var(--color-accent);
        }

        .search-box {
            flex: 1;
            min-width: 250px;
        }

        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
            overflow-x: auto;
        }

        .tab {
            padding: 8px 20px;
            background: var(--color-bg-secondary);
            border: 1px solid var(--color-border);
            border-radius: var(--radius-md);
            cursor: pointer;
            transition: all 0.2s;
            white-space: nowrap;
            font-weight: 500;
            font-size: 0.95rem;
        }

        .tab:hover {
            background: var(--color-bg-card);
        }

        .tab.active {
            background: var(--color-accent);
            color: white;
            border-color: var(--color-accent);
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }

        .card {
            background: var(--color-bg-secondary);
            border: 1px solid var(--color-border);
            border-radius: var(--radius-lg);
            padding: 20px;
            transition: transform 0.2s, border-color 0.2s;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .card:hover {
            transform: translateY(-2px);
            border-color: var(--color-accent);
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: start;
            gap: 10px;
        }

        .card-title {
            font-size: 1.4rem;
            font-weight: 600;
            color: var(--color-accent);
        }

        .badge {
            padding: 4px 10px;
            border-radius: var(--radius-sm);
            font-size: 0.8rem;
            font-weight: 600;
            white-space: nowrap;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .badge.manufacturer {
            background: var(--color-success-bg);
            color: var(--color-success);
            border: 1px solid var(--color-success);
        }

        .badge.shop {
            background: var(--color-info-bg);
            color: var(--color-info);
            border: 1px solid var(--color-info);
        }

        .card-info {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .info-row {
            display: flex;
            align-items: center;
            gap: 8px;
            color: var(--color-text-secondary);
            font-size: 0.95rem;
        }
        
        .phones-container {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .phone-item {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            padding: 4px 8px;
            border-radius: var(--radius-sm);
            transition: background 0.2s, color 0.2s;
            background: var(--color-bg-card); /* Subtle card bg */
            border: 1px solid var(--color-border);
        }
        
        .phone-item:hover {
            border-color: var(--color-accent);
            color: var(--color-text-primary);
        }
        
        .phone-item.copied {
            color: var(--color-success);
            border-color: var(--color-success);
        }

        .info-icon {
            width: 18px;
            height: 18px;
            opacity: 0.8;
            flex-shrink: 0;
        }
        
        .socials-container {
            display: flex;
            gap: 12px;
            margin-top: 8px;
        }
        
        .social-link {
            color: var(--color-text-secondary);
            transition: color 0.2s, transform 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .social-link:hover {
            color: var(--color-accent);
            transform: scale(1.1);
        }
        
        .social-icon {
            width: 22px;
            height: 22px;
        }

        .materials {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin-top: 4px;
        }

        .material-tag {
            padding: 2px 8px;
            background: var(--color-bg-card);
            border: 1px solid var(--color-border);
            border-radius: var(--radius-sm);
            font-size: 0.8rem;
            color: var(--color-text-secondary);
        }

        .card-footer {
            margin-top: auto;
            padding-top: 16px;
            border-top: 1px dotted var(--color-border); /* using dotted for a more subtle look */
        }

        .btn {
            display: inline-block;
            padding: 8px 16px;
            background: transparent;
            color: var(--color-accent);
            border: 1px solid var(--color-accent);
            text-decoration: none;
            border-radius: var(--radius-md);
            font-size: 0.95rem;
            font-weight: 500;
            text-align: center;
            transition: all 0.2s;
        }

        .btn:hover {
            background: var(--color-accent);
            color: var(--color-bg-primary);
        }

        .no-results {
            text-align: center;
            padding: 60px 20px;
            color: var(--color-text-secondary);
        }

        .no-results svg {
            width: 64px;
            height: 64px;
            opacity: 0.3;
            margin-bottom: 20px;
        }

        footer {
            text-align: center;
            padding: 40px 20px;
            color: var(--color-text-secondary);
            border-top: 1px solid var(--color-border);
            margin-top: 40px;
        }

        @media (max-width: 768px) {
            h1 {
                font-size: 2rem;
            }

            .grid {
                grid-template-columns: 1fr;
            }

            .filter-controls {
                flex-direction: column;
            }

            .filter-group, .search-box {
                width: 100%;
            }
        }
    </style>
    
</head>

        let currentType = 'all';
        let currentCity = 'all';
        let currentMaterial = 'all';
        let currentSort = 'default';
        let searchQuery = '';

        function init() {
            setupTheme();
            parseUrlParams();
            populateFilters();
            updateCounts();
            renderCards();
            setupEventListeners();
        }

        function parseUrlParams() {
            const params = new URLSearchParams(window.location.search);
            if (params.has('type')) currentType = params.get('type');
            if (params.has('city')) currentCity = params.get('city');
            if (params.has('material')) currentMaterial = params.get('material');
            if (params.has('sort')) currentSort = params.get('sort');
            if (params.has('q')) searchQuery = params.get('q');
            
            // Set select values
            document.getElementById('sortFilter').value = currentSort;
            if (searchQuery) document.getElementById('search').value = searchQuery;
            
            // tabs will be set in init after parsing
            document.querySelectorAll('.tab').forEach(t => {
                if (t.dataset.type === currentType) t.classList.add('active');
                else t.classList.remove('active');
            });
        }

        function updateUrlParams() {
            const params = new URLSearchParams();
            if (currentType !== 'all') params.set('type', currentType);
            if (currentCity !== 'all') params.set('city', currentCity);
            if (currentMaterial !== 'all') params.set('material', currentMaterial);
            if (currentSort !== 'default') params.set('sort', currentSort);
            if (searchQuery) params.set('q', searchQuery);

            const newUrl = window.location.pathname + (params.toString() ? '?' + params.toString() : '');
            window.history.replaceState({}, '', newUrl);
        }

        function getOperatorIcon(phone) {
            const cleanPhone = phone.replace(/\D/g, ''); // get numbers only
            if (cleanPhone.length >= 10) {
                const code = cleanPhone.slice(-10, -7); // simple check for last 10 digits
                
                const kyivstarCodes = ['067', '068', '096', '097', '098'];
                const vodafoneCodes = ['050', '066', '095', '099'];
                const lifecellCodes = ['063', '073', '093'];

                if (kyivstarCodes.includes(code)) return '#icon-kyivstar';
                if (vodafoneCodes.includes(code)) return '#icon-vodafone';
                if (lifecellCodes.includes(code)) return '#icon-lifecell';
            }
            return '#icon-phone'; // default placeholder
        }

        function copyToClipboard(text, element) {
            navigator.clipboard.writeText(text).then(() => {
                const iconUse = element.querySelector('use');
                const originalHref = iconUse.getAttribute('href');
                
                // Add success state
                element.classList.add('copied');
                iconUse.setAttribute('href', '#icon-check');
                
                setTimeout(() => {
                    element.classList.remove('copied');
                    iconUse.setAttribute('href', originalHref);
                }, 2000);
            });
        }

        function renderPhones(phoneString) {
            if (!phoneString) return '';
            
            const phones = phoneString.split(',').map(p => p.trim()).filter(p => p);
            
            const phoneItems = phones.map(phone => {
                const iconId = getOperatorIcon(phone);
                // click-to-copy or click-to-call mobile behavior using tel
                return `
                    <div class="phone-item" onclick="copyToClipboard('${phone}', this)">
                        <svg class="info-icon"><use href="${iconId}"></use></svg>
                        <span>${phone}</span>
                    </div>
                `;
            }).join('');

            return `<div class="phones-container">${phoneItems}</div>`;
        }

        function renderSocials(socials) {
            if (!socials || Object.keys(socials).length === 0) return '';
            
            let html = '<div class="socials-container">';
            if (socials.telegram) {
                html += `<a href="${socials.telegram}" target="_blank" class="social-link" title="Telegram"><svg class="social-icon"><use href="#icon-telegram"></use></svg></a>`;
            }
            if (socials.instagram) {
                html += `<a href="${socials.instagram}" target="_blank" class="social-link" title="Instagram"><svg class="social-icon"><use href="#icon-instagram"></use></svg></a>`;
            }
            html += '</div>';
            return html;
        }

        function setupTheme() {
            const themeToggle = document.getElementById('themeToggle');
            const themeIcon = document.getElementById('themeIcon').querySelector('use');
            const savedTheme = localStorage.getItem('theme');
            
            // Check system preference if no saved theme
            const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
            let currentTheme = savedTheme || (prefersDark ? 'dark' : 'light');

            const setTheme = (theme) => {
                document.documentElement.setAttribute('data-theme', theme);
                localStorage.setItem('theme', theme);
                themeIcon.setAttribute('href', theme === 'dark' ? '#icon-sun' : '#icon-moon');
                currentTheme = theme;
            };

            setTheme(currentTheme);

            themeToggle.addEventListener('click', () => {
                setTheme(currentTheme === 'dark' ? 'light' : 'dark');
            });
        }

        function populateFilters() {
            const cities = [...new Set(companies.map(c => c.city))].sort();
            const cityFilter = document.getElementById('cityFilter');
            cities.forEach(city => {
                cityFilter.add(new Option(city, city));
            });

            const materials = [...new Set(companies.flatMap(c => c.materials))].sort();
            const matFilter = document.getElementById('materialFilter');
            materials.forEach(mat => {
                matFilter.add(new Option(mat, mat));
            });
            cityFilter.value = currentCity;
            matFilter.value = currentMaterial;
        }

        function updateCounts() {
            const counts = {
                all: companies.length,
                manufacturer: companies.filter(c => c.type === 'manufacturer').length,
                shop: companies.filter(c => c.type === 'shop').length
            };

            document.querySelectorAll('.tab').forEach(tab => {
                const type = tab.dataset.type;
                tab.querySelector('.tab-count').textContent = `(${counts[type]})`;
            });
        }

        function renderCards() {
            const catalog = document.getElementById('catalog');
            const noResults = document.getElementById('noResults');
            
            let filtered = companies.filter(company => {
                const matchType = currentType === 'all' || company.type === currentType;
                const matchCity = currentCity === 'all' || company.city === currentCity;
                const matchMaterial = currentMaterial === 'all' || company.materials.includes(currentMaterial);
                const matchSearch = searchQuery === '' || 
                    company.name.toLowerCase().includes(searchQuery.toLowerCase()) ||
                    company.description.toLowerCase().includes(searchQuery.toLowerCase());
                
                return matchType && matchCity && matchMaterial && matchSearch;
            });
            
            // Sort logic
            if (currentSort === 'name_asc') {
                filtered.sort((a, b) => a.name.localeCompare(b.name, 'uk'));
            } else if (currentSort === 'name_desc') {
                filtered.sort((a, b) => b.name.localeCompare(a.name, 'uk'));
            }

            if (filtered.length === 0) {
                catalog.style.display = 'none';
                noResults.style.display = 'block';
                return;
            }

            catalog.style.display = 'grid';
            noResults.style.display = 'none';

            catalog.innerHTML = filtered.map(company => `
                <div class="card" style="animation: fadeIn 0.3s ease-out forwards;">
                    <div class="card-header">
                        <h3 class="card-title">${company.name}</h3>
                        <span class="badge ${company.type}">
                            ${company.type === 'manufacturer' ? 'Виробник' : 'Магазин'}
                        </span>
                    </div>
                    
                    <div class="card-info">
                        ${company.city ? `
                        <div class="info-row">
                            <svg class="info-icon"><use href="#icon-location"></use></svg>
                            <span>${company.city}</span>
                        </div>
                        ` : ''}
                        
                        ${renderPhones(company.phone)}
                        
                        ${renderSocials(company.socials)}
                        
                        <p style="color: var(--color-text-secondary); margin-top: 8px;">
                            ${company.description}
                        </p>
                    </div>

                    <div class="materials">
                        ${company.materials.map(mat => `<span class="material-tag">${mat}</span>`).join('')}
                    </div>

                    <div class="card-footer">
                        <a href="${company.url}" target="_blank" rel="noopener noreferrer" class="btn">
                            Перейти на сайт →
                        </a>
                    </div>
                </div>
            `).join('');
        }

        function setupEventListeners() {
            document.querySelectorAll('.tab').forEach(tab => {
                tab.addEventListener('click', () => {
                    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
                    tab.classList.add('active');
                    currentType = tab.dataset.type;
                    updateUrlParams();
                    renderCards();
                });
            });

            document.getElementById('cityFilter').addEventListener('change', (e) => {
                currentCity = e.target.value;
                updateUrlParams();
                renderCards();
            });

            document.getElementById('materialFilter').addEventListener('change', (e) => {
                currentMaterial = e.target.value;
                updateUrlParams();
                renderCards();
            });
            
            document.getElementById('sortFilter').addEventListener('change', (e) => {
                currentSort = e.target.value;
                updateUrlParams();
                renderCards();
            });

            document.getElementById('search').addEventListener('input', (e) => {
                searchQuery = e.target.value;
                updateUrlParams();
                renderCards();
            });
        }

        // Add fadeIn animation to styles dynamically
        const style = document.createElement('style');
        style.textContent = `
            @keyframes fadeIn {
                from { opacity: 0; transform: translateY(10px); }
                to { opacity: 1; transform: translateY(0); }
            }
            .tab-count {
                opacity: 0.6;
                font-size: 0.8em;
                margin-left: 4px;
            }
